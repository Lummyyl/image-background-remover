<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像背景移除工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .upload-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        .control-group select,
        .control-group input {
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
        }

        .process-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .process-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .process-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            margin-top: 30px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .result-item {
            text-align: center;
        }

        .result-item h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .result-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .download-btn {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .download-btn:hover {
            background: #138496;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 768px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 图像背景移除工具</h1>
            <p>轻松移除图片背景，支持多种算法和自定义参数</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="upload-area">
                    <div class="upload-icon">📸</div>
                    <h3>选择图片文件</h3>
                    <p>支持 PNG, JPEG, WebP, BMP 格式，最大 10MB</p>
                    <input type="file" id="imageInput" class="file-input" accept="image/*">
                    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
                        选择图片
                    </button>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <label for="algorithm">处理算法</label>
                        <select id="algorithm">
                            <option value="edge-detection">边缘检测</option>
                            <option value="color-based">基于颜色</option>
                            <option value="remove-bg">Remove.bg API</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="threshold">阈值 (0-1)</label>
                        <input type="number" id="threshold" min="0" max="1" step="0.1" value="0.5">
                    </div>
                    <div class="control-group">
                        <label for="feathering">羽化程度</label>
                        <input type="number" id="feathering" min="0" max="10" step="1" value="2">
                    </div>
                    <div class="control-group" id="apiKeyGroup" style="display: none;">
                        <label for="removeBgApiKey">Remove.bg API Key</label>
                        <input type="password" id="removeBgApiKey" placeholder="输入你的 API Key">
                    </div>
                </div>

                <button class="process-btn" id="processBtn" disabled>
                    开始处理
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <h3>正在处理图片...</h3>
                <p>请稍候，这可能需要几秒钟</p>
            </div>

            <div class="error" id="error"></div>
            <div class="success" id="success"></div>

            <div class="result-section" id="resultSection">
                <h2>处理结果</h2>
                <div class="result-grid">
                    <div class="result-item">
                        <h3>原始图片</h3>
                        <img id="originalImage" class="result-image" alt="原始图片">
                    </div>
                    <div class="result-item">
                        <h3>处理后图片</h3>
                        <img id="processedImage" class="result-image" alt="处理后图片">
                        <br>
                        <button class="download-btn" id="downloadBtn">
                            下载结果
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const processBtn = document.getElementById('processBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const resultSection = document.getElementById('resultSection');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const downloadBtn = document.getElementById('downloadBtn');

        let uploadedFile = null;

        // 文件选择事件
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                uploadedFile = file;
                processBtn.disabled = false;
                
                // 显示预览
                const reader = new FileReader();
                reader.onload = function(e) {
                    originalImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // 算法选择变化事件
        document.getElementById('algorithm').addEventListener('change', function() {
            const apiKeyGroup = document.getElementById('apiKeyGroup');
            const algorithm = this.value;
            
            if (algorithm === 'remove-bg') {
                apiKeyGroup.style.display = 'flex';
                // 自动填充配置的 API Key
                const configApiKey = 'NR6A5rLUCEkNykgRyivU1MXu';
                document.getElementById('removeBgApiKey').value = configApiKey;
            } else {
                apiKeyGroup.style.display = 'none';
            }
        });

        // 处理按钮点击事件
        processBtn.addEventListener('click', async function() {
            if (!uploadedFile) return;

            // 重置状态
            error.style.display = 'none';
            success.style.display = 'none';
            loading.style.display = 'block';
            resultSection.style.display = 'none';

            const formData = new FormData();
            formData.append('image', uploadedFile);
            formData.append('algorithm', document.getElementById('algorithm').value);
            formData.append('threshold', document.getElementById('threshold').value);
            formData.append('feathering', document.getElementById('feathering').value);
            
            // 如果选择了 Remove.bg，添加 API Key
            const algorithm = document.getElementById('algorithm').value;
            if (algorithm === 'remove-bg') {
                const apiKey = document.getElementById('removeBgApiKey').value;
                if (!apiKey) {
                    loading.style.display = 'none';
                    error.style.display = 'block';
                    error.textContent = '请输入 Remove.bg API Key';
                    return;
                }
                formData.append('removeBgApiKey', apiKey);
            }

            try {
                const response = await fetch('/api/remove-background', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    loading.style.display = 'none';
                    success.style.display = 'block';
                    success.textContent = result.message;
                    
                    // 显示处理后的图片
                    processedImage.src = result.outputUrl;
                    resultSection.style.display = 'block';
                    
                    // 设置下载链接
                    downloadBtn.onclick = function() {
                        const link = document.createElement('a');
                        link.href = result.outputUrl;
                        link.download = `processed-${uploadedFile.name}`;
                        link.click();
                    };
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = '处理失败: ' + err.message;
            }
        });
    </script>
</body>
</html>
